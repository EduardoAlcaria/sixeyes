services:

  db:
    image: postgres:16-alpine
    container_name: sixeyes-db
    restart: unless-stopped
  
    expose:
      - "5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - sixeyes-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  python-backend:
    build:
      context: ./python
      dockerfile: Dockerfile
    container_name: sixeyes-python
    restart: unless-stopped

    expose:
      - "9999"
    volumes:
      - ${DOWNLOAD_PATH:-./downloads}:/app/downloads
      - agent-state:/app/state
      - C:/:/host/C
      - D:/:/host/D
    networks:
      - sixeyes-net
    environment:
      - DOWNLOAD_PATH=/app/downloads
      - HOST_DRIVES=/host/C,/host/D
      - STATE_DIR=/app/state
    healthcheck:
   
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:9999/python/test || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  java-backend:
    build:
      context: ./java/controller
      dockerfile: Dockerfile
    container_name: sixeyes-java
    restart: unless-stopped
    ports:
      - "9090:9090"
    depends_on:
      python-backend:
        condition: service_started
      db:
        condition: service_healthy
    networks:
      - sixeyes-net
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
      - PYTHON_SERVICE_URL=http://sixeyes-python:9999
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - DB_URL=jdbc:postgresql://db:5432/${DB_NAME}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - IGDB_CLIENT_ID=${IGDB_CLIENT_ID}
      - IGDB_CLIENT_SECRET=${IGDB_CLIENT_SECRET}
    healthcheck:
  
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:9090/api/v1/torrents/test || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./js
      dockerfile: Dockerfile
    container_name: sixeyes-frontend
    restart: unless-stopped
    ports:
      - "4000:80"
    depends_on:
      - java-backend
    networks:
      - sixeyes-net

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: sixeyes-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - frontend
    networks:
      - sixeyes-net

networks:
  sixeyes-net:
    driver: bridge

volumes:
  db-data:
  agent-state:
